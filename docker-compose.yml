services:
  ksef-service:
    image: ghcr.io/seba11/ksef-service:latest
    container_name: ksef-service
    ports:
      - "8080:8080"
    environment:
      KSEF_MODE: production
      KSEF_IDENTIFIER: "1234567890"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/test || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
